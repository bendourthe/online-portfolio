<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024"
     viewBox="0 0 1024 1024">
  <!-- Monochrome Nexus-Hub motif: four corner nodes wired through a central hub.
       Safari applies the mask-icon color (steelblue) at render time. -->
  <g fill="#000000" stroke="#000000" stroke-width="26" stroke-linecap="round">
    <line x1="232" y1="232" x2="512" y2="512"/>
    <line x1="792" y1="232" x2="512" y2="512"/>
    <line x1="232" y1="792" x2="512" y2="512"/>
    <line x1="792" y1="792" x2="512" y2="512"/>
    <circle cx="232" cy="232" r="48"/>
    <circle cx="792" cy="232" r="48"/>
    <circle cx="232" cy="792" r="48"/>
    <circle cx="792" cy="792" r="48"/>
    <circle cx="512" cy="512" r="46"/>
  </g>
</svg>
